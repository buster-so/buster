apps:
# ------------------------------------------------------------
# API v1 - Rust API
# ------------------------------------------------------------
  - version: v2
    name: api/v1
    services:
      - name: api/v1
        run: ""
        type: web
        instances: 1
        cpuCores: 1
        ramMegabytes: 1000
        terminationGracePeriodSeconds: 30
        port: 3001
        domains:
          - api2staging.buster.so
        sleep: false
        pathRouting:
          - path: /api/v1/
            port: 3001
            appName: api
            serviceName: v1
    build:
      context: ../../api
      method: docker
      dockerfile: ../../api/Dockerfile
    envGroups: # Environment groups can be used to inject environment variables from the addons into the service.
      - staging
    pathRoutingConfig:
      rewriteMode: rewrite-off

# ------------------------------------------------------------
# API v2 - Hono (built with Bun) API
# ------------------------------------------------------------
  - version: v2
    name: api/v2
    services:
      - name: api/v2
        run: ""
        type: web
        instances: 1
        cpuCores: 1
        ramMegabytes: 1000
        terminationGracePeriodSeconds: 30
        port: 3002
        domains:
          - api2staging.buster.so
        sleep: false
        pathRouting:
          - path: /api/v2/
            port: 3002
            appName: api
            serviceName: v2
    build:
      context: ../../server
      method: docker
      dockerfile: ../../server/Dockerfile
    envGroups: # Environment groups can be used to inject environment variables from the addons into the service.
      - staging
    pathRoutingConfig:
      rewriteMode: rewrite-off